<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YOLITIA · Catálogo en línea</title>
  <meta name="description" content="Descarga el catálogo en línea de YOLITIA: figuras y piezas decorativas impresas en 3D." />
  <meta name="theme-color" content="#4A4458" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="apple-touch-icon" href="assets/logo.png" />
  <meta property="og:title" content="YOLITIA · Catálogo en línea" />
  <meta property="og:description" content="Descarga el catálogo en PDF de YOLITIA." />
  <meta property="og:image" content="assets/logo.png" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --marfil: #f5f0e6;
      --marfil-claro: #faf7ef;
      --crema: #e8dcc4;
      --kraft: #d9cba8;
      --negro: #1a1614;
      --negro-suave: #2d2620;
      --morado: #4a4458;
      --verde: #5c6e54;
      --marron: #5a4a3a;
      --linea: #c9bfa9;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--marfil);
      color: var(--negro);
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(217,203,168,.45), transparent 45%),
        radial-gradient(circle at 88% 82%, rgba(74,68,88,.10), transparent 55%);
    }
    .card {
      background: var(--marfil-claro);
      border: 1px solid var(--linea);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 60px -30px rgba(26,22,20,.25);
    }
    .logo {
      width: 88px;
      height: auto;
      margin: 0 auto 8px;
      display: block;
    }
    .brand {
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-weight: 600;
      font-size: 38px;
      letter-spacing: .12em;
      color: var(--negro);
      margin: 0;
    }
    .tag {
      font-size: 11px;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--marron);
      margin: 6px 0 28px;
    }
    .rule {
      width: 56px;
      height: 1px;
      background: var(--kraft);
      margin: 0 auto 28px;
    }
    h1 {
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-weight: 500;
      font-size: 30px;
      line-height: 1.2;
      margin: 0 0 12px;
      color: var(--negro-suave);
    }
    p.lead {
      font-size: 15px;
      line-height: 1.6;
      color: var(--marron);
      margin: 0 0 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--negro);
      color: var(--marfil);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 16px 32px;
      border-radius: 999px;
      transition: transform .15s ease, background .2s ease, box-shadow .2s ease;
      box-shadow: 0 8px 24px -10px rgba(26,22,20,.5);
    }
    .btn:hover { background: var(--morado); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn svg { width: 16px; height: 16px; }
    .meta {
      margin-top: 28px;
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--marron);
    }
    .meta span { color: var(--negro-suave); font-weight: 500; }
    .footer {
      margin-top: 40px;
      font-size: 11px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--marron);
    }
    .status {
      margin-top: 14px;
      font-size: 12px;
      color: var(--verde);
      min-height: 16px;
    }
    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <img class="logo" src="assets/logo.png" alt="YOLITIA" />
    <h2 class="brand">YOLITIA</h2>
    <div class="tag">Catálogo en línea</div>
    <div class="rule" aria-hidden="true"></div>
    <h1>Tu catálogo, siempre actualizado</h1>
    <p class="lead">
      Escanea, abre o descarga la versión más reciente de nuestro catálogo en PDF.
      El archivo se actualiza automáticamente, este enlace nunca cambia.
    </p>
    <a id="download" class="btn" href="catalogo-yolitia.pdf" download="Catalogo-YOLITIA.pdf" aria-label="Descargar catálogo en PDF">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="7 10 12 15 17 10" />
        <line x1="12" y1="15" x2="12" y2="3" />
      </svg>
      Descargar catálogo
    </a>
    <div class="status" id="status" aria-live="polite"></div>
    <div class="meta">Formato <span>PDF</span> &nbsp;·&nbsp; Tamaño <span id="size">~24 MB</span></div>
    <div class="footer">Hecho con PLA biodegradable</div>
  </main>

  <script>
    (function () {
      var PDF_URL = "catalogo-yolitia.pdf";
      var statusEl = document.getElementById("status");
      var sizeEl = document.getElementById("size");
      var btn = document.getElementById("download");

      function humanSize(bytes) {
        if (!bytes) return null;
        var mb = bytes / (1024 * 1024);
        return mb >= 1 ? mb.toFixed(1) + " MB" : Math.round(bytes / 1024) + " KB";
      }

      fetch(PDF_URL, { method: "HEAD" })
        .then(function (r) {
          var len = r.headers.get("Content-Length");
          if (len) {
            var s = humanSize(parseInt(len, 10));
            if (s) sizeEl.textContent = s;
          }
        })
        .catch(function () {});

      var autoDownloaded = false;
      function tryAutoDownload() {
        if (autoDownloaded) return;
        autoDownloaded = true;
        try {
          var a = document.createElement("a");
          a.href = PDF_URL;
          a.download = "Catalogo-YOLITIA.pdf";
          a.rel = "noopener";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          statusEl.textContent = "Descarga iniciada. Si no comenzó, usa el botón.";
        } catch (e) {
          statusEl.textContent = "Toca el botón para descargar.";
        }
      }

      btn.addEventListener("click", function () { autoDownloaded = true; });

      var navUA = navigator.userAgent || "";
      var isBot = /bot|crawl|spider|preview|lighthouse|pagespeed|facebookexternalhit/i.test(navUA);
      if (!isBot && !sessionStorage.getItem("yolitia_dl")) {
        sessionStorage.setItem("yolitia_dl", "1");
        window.addEventListener("load", function () {
          setTimeout(tryAutoDownload, 600);
        });
      }
    })();
  </script>
</body>
</html>
