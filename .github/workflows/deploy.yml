name: Deploy catalogo yolitia

on:
  push:
    branches: [main]
    paths:
      - "public/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Descargar PDF desde la última release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p public
          if gh release download v1 --repo "$GITHUB_REPOSITORY" --pattern 'catalogo-yolitia.pdf' --dir public/ 2>/dev/null; then
            echo "PDF descargado desde la release v1"
          else
            echo "No se encontro release v1; se sirve sin PDF"
          fi

      - name: Subir artefacto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "public"

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
