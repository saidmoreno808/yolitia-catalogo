name: Deploy catalogo yolitia

on:
  push:
    branches: [main]
    paths:
      - "public/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Descargar PDF desde la última release
        id: pdf
        uses: actions/download-artifact@v4
        with:
          name: catalogo-pdf
          path: public/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Fallback: descargar PDF desde la última release (gh CLI)
        if: steps.pdf.outcome != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          URL=$(gh release view --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[] | select(.name=="catalogo-yolitia.pdf") | .url')
          if [ -n "$URL" ]; then
            gh release download --repo "$GITHUB_REPOSITORY" --pattern 'catalogo-yolitia.pdf' --dir public/
          else
            echo "No hay release con catalogo-yolitia.pdf. El sitio funcionará sin PDF."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
